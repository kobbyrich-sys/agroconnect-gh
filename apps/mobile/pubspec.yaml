name: agroconnect_mobile
description: AgroConnect GH - Ghana's agricultural and manufacturing marketplace
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Supabase
  supabase_flutter: ^2.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.1

  # Storage & Caching
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.1.2
  carousel_slider: ^5.0.0

  # Maps
  google_maps_flutter: ^2.12.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Payments
  paystack_flutter: ^2.0.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.2
  package_info_plus: ^8.2.1
  phone_number: ^2.1.0
  flutter_local_notifications: ^18.0.1

  # Auth
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
